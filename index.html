<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Rotina</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>📅 Gerador de Rotina</h1>
    <p>Organiza o teu dia de forma simples</p>

    <input type="number" id="horas" placeholder="Horas disponíveis">

    <select id="objetivo">
      <option value="Estudo">Estudo</option>
      <option value="Trabalho">Trabalho</option>
      <option value="Treino">Treino</option>
      <option value="Descanso">Descanso</option>
    </select>

    <button onclick="gerarRotina()">Gerar Rotina</button>

    <div id="resultado"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>

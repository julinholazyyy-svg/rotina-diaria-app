<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>SweetBite Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">🍫 SweetBite</div>

  <input type="text" id="search" placeholder="Pesquisar doces..." onkeyup="filtrar()">

  <div class="cart">
    🛒 <span id="cartCount">0</span>
  </div>
</header>

<section class="hero">
  <h1>Doces artesanais premium</h1>
  <p>Qualidade, sabor e elegância em cada mordida</p>
</section>

<section class="produtos" id="produtos">

  <div class="card" data-name="caixa classica chocolate">
    <img src="https://images.unsplash.com/photo-1549007994-cb92caebd54b">
    <h3>Caixa Clássica</h3>
    <p>12 chocolates artesanais</p>
    <span>14,99€</span>
    <button onclick="comprar()">Adicionar ao carrinho</button>
  </div>

  <div class="card" data-name="trufas premium chocolate">
    <img src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52">
    <h3>Trufas Premium</h3>
    <p>Trufas de chocolate belga</p>
    <span>9,99€</span>
    <button onclick="comprar()">Adicionar ao carrinho</button>
  </div>

  <div class="card" data-name="caixa oferta presente chocolate">
    <img src="https://images.unsplash.com/photo-1511381939415-e44015466834">
    <h3>Caixa Oferta</h3>
    <p>Edição especial para presentes</p>
    <span>19,99€</span>
    <button onclick="comprar()">Adicionar ao carrinho</button>
  </div>

</section>

<footer>
  <p>© 2026 SweetBite Store</p>
</footer>

<script src="script.js"></script>
</body>
</html>
